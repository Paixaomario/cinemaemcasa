<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaixãoFlix Bridge</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #00ADEF;
            font-family: sans-serif;
        }
    </style>
    <script>
        function startApp() {
            if (window.webOS && window.webOS.app && window.webOS.app.setWindowProperties) {
                window.webOS.app.setWindowProperties({ "keepAlive": true });
            }
            // Redirecionamento direto e imediato para a versão live
            window.location.replace("https://cinemaemcasa.vercel.app");
        }
        // Inicia o processo imediatamente sem esperar o carregamento de imagens pesadas
        startApp();
    </script>
</head>
<body>
    <div style="font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase; color: #00ADEF;">Iniciando Cinema em Casa...</div>
</body>
</html>
